name: Deploy to GitHub Pages

on:
  # main 브랜치에 push 될 때마다 자동 배포
  push:
    branches: [main]
  # Actions 탭에서 수동 실행도 가능
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포가 겹치지 않게 큐 관리
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload
        uses: withastro/action@v3
        # with:
        #   path: .          # package.json 위치 (기본: 레포 루트)
        #   node-version: 20 # 사용할 Node 버전
        #   package-manager: npm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
